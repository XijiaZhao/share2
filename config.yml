# AudioAction model server configuration
host: 0.0.0.0          # bind address
port: 8025             # serve on this port
device: auto           # auto | cuda | cpu   (auto = use GPU if present, else CPU)
warmup: true           # warm up at startup so the first request is steady-state
max_audio_seconds: 300 # reject single requests longer than this
target_fps: 20           # output frame rate sent to clients; empty = native 10 fps.
                       # non-10 resamples (up = smoother/more data, down = fewer/less data),
                       # preserving audio duration. clamped to 1-50. per-request override: /infer?fps=N

# select which model to serve
model: xba             # one of the keys in `models` below
models:
  a: audioaction_a.pt              # English — all data                       (output [0,1])
  b: audioaction_b.pt              # English — held-out variant               (output [0,1])
  zha: audioaction_zha.pt          # combined EN+ZH all-data (Chinese-capable) — default  (output [0,1])
  xba: audioaction_xba.pt          # round-2 WIDE-RANGE, voice zf_xiaobei, all-data   (output TRUE ~[-1.0,1.6], 10fps)
  fps25: audioaction_fps25.pt      # round-2 WIDE-RANGE, NATIVE 25 fps, single closed-lip ref (output TRUE ~[-0.74,1.6])
# NOTE: xba and fps25 emit the TRUE wide-range command (per-DoF ranges_xb in meta.json), NOT [0,1];
#       their PWM map must cover that range. fps25 outputs at 25 fps (750 frames/30s chunk) — the
#       runtime auto-detects this from the model, so no other change is needed. To serve it:
#       model: fps25   (or `serve.py --model fps25`).  Default stays `zha` for backward compatibility.
